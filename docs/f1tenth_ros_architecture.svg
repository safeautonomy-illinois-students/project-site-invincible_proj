<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
<defs>
<style>
.title { font: 700 30px Arial, Helvetica, sans-serif; fill: #1f2937; }
.subtitle { font: 600 16px Arial, Helvetica, sans-serif; fill: #374151; letter-spacing: 1px; }
.box-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #111827; }
.box-text { font: 15px Arial, Helvetica, sans-serif; fill: #374151; }
.topic { font: italic 15px Arial, Helvetica, sans-serif; fill: #0f766e; }
.small { font: 13px Arial, Helvetica, sans-serif; fill: #6b7280; }
.section-label { font: 700 18px Arial, Helvetica, sans-serif; fill: white; }
.footer { font: 13px Arial, Helvetica, sans-serif; fill: #6b7280; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
</marker>
<filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
<feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.35"/>
</filter>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="800" y="52" text-anchor="middle" class="title">F1TENTH ROS Node Tree / Workflow</text>
<text x="800" y="82" text-anchor="middle" class="subtitle">Cartographer + A* + Path Smoothing + Curvature-Based Speed Planning + Stanley + PID</text>

<rect x="50" y="120" width="1500" height="150" rx="22" fill="white" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="50" y="120" width="265" height="38" rx="18" fill="#2563eb"/>
<text x="182" y="145" text-anchor="middle" class="section-label">SENSORS / DRIVERS</text>
<rect x="50" y="300" width="1500" height="160" rx="22" fill="white" stroke="#0891b2" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="50" y="300" width="265" height="38" rx="18" fill="#0891b2"/>
<text x="182" y="325" text-anchor="middle" class="section-label">LOCALIZATION / MAPPING</text>
<rect x="50" y="490" width="1500" height="260" rx="22" fill="white" stroke="#7c3aed" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="50" y="490" width="265" height="38" rx="18" fill="#7c3aed"/>
<text x="182" y="515" text-anchor="middle" class="section-label">PLANNING / TRAJECTORY GENERATION</text>
<rect x="50" y="780" width="1500" height="300" rx="22" fill="white" stroke="#059669" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="50" y="780" width="265" height="38" rx="18" fill="#059669"/>
<text x="182" y="805" text-anchor="middle" class="section-label">CONTROL / ACTUATION</text>
<rect x="90" y="170" width="280" height="80" rx="18" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<text x="230.0" y="198" text-anchor="middle" class="box-title">/lidar_driver</text>
<text x="230.0" y="225" text-anchor="middle" class="box-text">Publishes scan data</text>
<text x="230.0" y="236" text-anchor="middle" class="topic">/scan  sensor_msgs/LaserScan</text>
<rect x="430" y="170" width="280" height="80" rx="18" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<text x="570.0" y="198" text-anchor="middle" class="box-title">/imu_driver</text>
<text x="570.0" y="225" text-anchor="middle" class="box-text">Publishes inertial measurements</text>
<text x="570.0" y="236" text-anchor="middle" class="topic">/imu  sensor_msgs/Imu</text>
<rect x="770" y="170" width="300" height="80" rx="18" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<text x="920.0" y="198" text-anchor="middle" class="box-title">/odom_node</text>
<text x="920.0" y="225" text-anchor="middle" class="box-text">Wheel / VESC odometry</text>
<text x="920.0" y="236" text-anchor="middle" class="topic">/odom  nav_msgs/Odometry</text>
<rect x="480" y="350" width="640" height="90" rx="18" fill="#ecfeff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
<text x="800.0" y="378" text-anchor="middle" class="box-title">/cartographer_node</text>
<text x="800.0" y="405" text-anchor="middle" class="box-text">Inputs: /scan, /imu, /odom</text>
<text x="800.0" y="427" text-anchor="middle" class="box-text">Outputs: /map and /vehicle_pose</text>
<rect x="1200" y="320" width="250" height="70" rx="18" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="2" filter="url(#shadow)"/>
<text x="1325.0" y="348" text-anchor="middle" class="box-title">Map output</text>
<text x="1325.0" y="375" text-anchor="middle" class="box-text">Occupancy grid</text>
<text x="1325.0" y="376" text-anchor="middle" class="topic">/map</text>
<rect x="1200" y="400" width="250" height="70" rx="18" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="2" filter="url(#shadow)"/>
<text x="1325.0" y="428" text-anchor="middle" class="box-title">Pose output</text>
<text x="1325.0" y="455" text-anchor="middle" class="box-text">Estimated vehicle pose</text>
<text x="1325.0" y="456" text-anchor="middle" class="topic">/vehicle_pose</text>
<rect x="100" y="555" width="260" height="80" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<text x="230.0" y="583" text-anchor="middle" class="box-title">/goal_manager</text>
<text x="230.0" y="610" text-anchor="middle" class="box-text">Waypoint / lap goal source</text>
<text x="230.0" y="621" text-anchor="middle" class="topic">/goal_pose</text>
<rect x="455" y="540" width="370" height="100" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<text x="640.0" y="568" text-anchor="middle" class="box-title">/astar_planner</text>
<text x="640.0" y="598" text-anchor="middle" class="box-text">Inputs: /map, /vehicle_pose, /goal_pose</text>
<text x="640.0" y="620" text-anchor="middle" class="box-text">Computes collision-free global path</text>
<text x="640.0" y="624" text-anchor="middle" class="topic">/global_path  nav_msgs/Path</text>
<rect x="920" y="540" width="280" height="100" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<text x="1060.0" y="568" text-anchor="middle" class="box-title">/path_smoother_node</text>
<text x="1060.0" y="598" text-anchor="middle" class="box-text">Spline / waypoint smoothing</text>
<text x="1060.0" y="620" text-anchor="middle" class="box-text">Generates drivable path</text>
<text x="1060.0" y="624" text-anchor="middle" class="topic">/smoothed_path</text>
<rect x="1260" y="540" width="250" height="100" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<text x="1385.0" y="568" text-anchor="middle" class="box-title">/speed_planner_node</text>
<text x="1385.0" y="598" text-anchor="middle" class="box-text">Curvature-based speed profile</text>
<text x="1385.0" y="620" text-anchor="middle" class="box-text">Slower in tight turns</text>
<text x="1385.0" y="624" text-anchor="middle" class="topic">/target_speed</text>
<rect x="590" y="670" width="420" height="60" rx="18" fill="#faf5ff" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<text x="800.0" y="698" text-anchor="middle" class="box-title">/trajectory_manager</text>
<text x="800.0" y="725" text-anchor="middle" class="box-text">Creates local reference / lookahead state</text>
<text x="800.0" y="716" text-anchor="middle" class="topic">/reference_path + reference_state</text>
<rect x="170" y="850" width="380" height="120" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
<text x="360.0" y="878" text-anchor="middle" class="box-title">/stanley_controller</text>
<text x="360.0" y="908" text-anchor="middle" class="box-text">Inputs: /reference_path, /vehicle_pose, /odom</text>
<text x="360.0" y="930" text-anchor="middle" class="box-text">Computes steering from cross-track and heading error</text>
<text x="360.0" y="954" text-anchor="middle" class="topic">/steering_cmd</text>
<rect x="610" y="850" width="380" height="120" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
<text x="800.0" y="878" text-anchor="middle" class="box-title">/pid_speed_controller</text>
<text x="800.0" y="908" text-anchor="middle" class="box-text">Inputs: /target_speed, /odom</text>
<text x="800.0" y="930" text-anchor="middle" class="box-text">Computes throttle / speed command</text>
<text x="800.0" y="954" text-anchor="middle" class="topic">/speed_cmd</text>
<rect x="1050" y="850" width="240" height="120" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
<text x="1170.0" y="878" text-anchor="middle" class="box-title">/drive_command_mux</text>
<text x="1170.0" y="905" text-anchor="middle" class="box-text">Combines lateral + longitudinal commands</text>
<text x="1170.0" y="956" text-anchor="middle" class="topic">/drive  ackermann_msgs/AckermannDriveStamped</text>
<rect x="1325" y="850" width="200" height="120" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
<text x="1425.0" y="878" text-anchor="middle" class="box-title">/vehicle_interface</text>
<text x="1425.0" y="905" text-anchor="middle" class="box-text">Sends command to F1TENTH platform</text>
<rect x="1200" y="1010" width="250" height="50" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<text x="1325.0" y="1038" text-anchor="middle" class="box-title">F1TENTH Vehicle</text>
<text x="1325.0" y="1065" text-anchor="middle" class="box-text">Motion closes the loop back to sensors</text>
