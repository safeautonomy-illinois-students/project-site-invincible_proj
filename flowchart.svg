<svg xmlns="http://www.w3.org/2000/svg" width="647" height="1854" viewBox="0 0 647 1854">
  <defs>
    <linearGradient id="boxFill" x1="0" x2="1">
      <stop offset="0%" stop-color="#1f2024"/>
      <stop offset="100%" stop-color="#24262b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#d8d8d8"/>
    </marker>
    <style>
      .box { fill: url(#boxFill); stroke: #cfcfcf; stroke-width: 2.5; rx: 0; }
      .line { fill: none; stroke: #d8d8d8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .label { fill: #d3d3d3; font-family: "Inter", "Arial", sans-serif; font-size: 29px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="647" height="1854" fill="#000000"/>

  <!-- Boxes -->
  <rect class="box" x="277" y="16" width="250" height="98"/>
  <rect class="box" x="183" y="213" width="440" height="132"/>
  <rect class="box" x="48" y="445" width="407" height="101"/>
  <rect class="box" x="16" y="645" width="471" height="134"/>
  <rect class="box" x="50" y="878" width="403" height="132"/>
  <rect class="box" x="25" y="1109" width="434" height="133"/>
  <rect class="box" x="24" y="1343" width="452" height="101"/>
  <rect class="box" x="55" y="1510" width="390" height="131"/>
  <rect class="box" x="175" y="1740" width="456" height="104"/>

  <!-- Vertical arrows -->
  <path class="line" d="M402 114 L402 213"/>
  <path class="line" d="M320 345 C285 372, 258 392, 250 445"/>
  <path class="line" d="M251 546 L251 645"/>
  <path class="line" d="M251 779 L251 878"/>
  <path class="line" d="M251 1010 L251 1109"/>
  <path class="line" d="M251 1242 L251 1343"/>
  <path class="line" d="M251 1444 L251 1510"/>
  <path class="line" d="M282 1641 C282 1685, 300 1698, 321 1740"/>

  <!-- Right-side feedback loop -->
  <path class="line" d="M479 1790
                        C545 1760, 556 1710, 556 1622
                        L556 465
                        C556 392, 530 362, 493 345"/>

  <!-- Text -->
  <text class="label" x="402" y="65">Start Car</text>

  <text class="label" x="403" y="258">
    <tspan x="403" dy="0">Read Sensors</tspan>
    <tspan x="403" dy="40">LiDAR / Camera / IMU</tspan>
  </text>

  <text class="label" x="251.5" y="495">Process Sensor Data</text>

  <text class="label" x="251.5" y="700">
    <tspan x="251.5" dy="0">Understand Track / Free</tspan>
    <tspan x="251.5" dy="40">Space</tspan>
  </text>

  <text class="label" x="251.5" y="934">
    <tspan x="251.5" dy="0">Choose Target Path</tspan>
    <tspan x="251.5" dy="40">or Driving Direction</tspan>
  </text>

  <text class="label" x="242" y="1170">
    <tspan x="242" dy="0">Controller Computes</tspan>
    <tspan x="242" dy="40">Steering + Speed</tspan>
  </text>

  <text class="label" x="250" y="1393">Send Commands to Car</text>
  <text class="label" x="250" y="1575">Car Moves Forward</text>
  <text class="label" x="403" y="1792">Check New Sensor Data</text>
</svg>
